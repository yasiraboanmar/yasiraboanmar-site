backend:
  name: github
  repo: yasiraboanmar/yasiraboanmar-site
  branch: main
  base_url: https://yasiraboanmar.com
  auth_endpoint: /api/auth

media_folder: public/images/blog
public_folder: /images/blog

locale: ar

collections:
  - name: blog_ar
    label: "المقالات (عربي)"
    label_singular: "مقال عربي"
    folder: src/content/blog/ar
    create: true
    slug: "{{fields.url_slug}}"
    fields:
      - label: "الرابط (slug)"
        name: url_slug
        widget: string
        required: true
        hint: "أحرف إنجليزية صغيرة وأرقام وشرطات فقط — يجب أن يكون نفسه في المقال الإنجليزي. مثال: hr-history-digital-era"
        pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', "أحرف إنجليزية صغيرة وأرقام وشرطات فقط"]
      - label: "العنوان (عربي)"
        name: title
        widget: string
        required: true
      - label: "الوصف (عربي)"
        name: description
        widget: text
        required: true
      - label: "تاريخ النشر"
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: "الوسوم"
        name: tags
        widget: list
        required: false
        default: []
      - label: "مسودة (لا ينشر)"
        name: draft
        widget: boolean
        default: false
      - label: "تم النشر على LinkedIn"
        name: linkedinPosted
        widget: boolean
        default: false
      - label: "صورة الغلاف (اختياري)"
        name: cover
        widget: string
        required: false
      - label: "محتوى المقال (عربي)"
        name: body
        widget: markdown

  - name: blog_en
    label: "Articles (English)"
    label_singular: "English Article"
    folder: src/content/blog/en
    create: true
    slug: "{{fields.url_slug}}"
    fields:
      - label: "URL Slug"
        name: url_slug
        widget: string
        required: true
        hint: "Lowercase letters, numbers, and hyphens only — must match the Arabic post slug exactly."
        pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', "Lowercase letters, numbers, and hyphens only"]
      - label: "Title (English)"
        name: title
        widget: string
        required: true
      - label: "Description (English)"
        name: description
        widget: text
        required: true
      - label: "Publish Date"
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
      - label: "Draft (don't publish)"
        name: draft
        widget: boolean
        default: false
      - label: "Posted on LinkedIn"
        name: linkedinPosted
        widget: boolean
        default: false
      - label: "Cover image (optional)"
        name: cover
        widget: string
        required: false
      - label: "Article content (English)"
        name: body
        widget: markdown
