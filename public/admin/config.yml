backend:
  name: github
  repo: yasiraboanmar/yasiraboanmar-site
  branch: main
  base_url: https://yasiraboanmar.com
  auth_endpoint: /api/auth

media_folder: public/images/blog
public_folder: /images/blog

locale: ar

collections:
  - name: blog
    label: المقالات
    label_singular: مقال
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - label: عنوان المقال (عربي)
        name: title
        widget: string
        required: true
      - label: عنوان المقال (إنجليزي)
        name: titleEn
        widget: string
        required: false
      - label: وصف المقال (عربي)
        name: description
        widget: text
        required: true
      - label: وصف المقال (إنجليزي)
        name: descriptionEn
        widget: text
        required: false
      - label: تاريخ النشر
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: الوسوم
        name: tags
        widget: list
        required: false
        default: []
      - label: مسودة (لا ينشر)
        name: draft
        widget: boolean
        default: false
      - label: تم النشر على LinkedIn
        name: linkedinPosted
        widget: boolean
        default: false
      - label: صورة الغلاف (مسار اختياري)
        name: cover
        widget: string
        required: false
      - label: محتوى المقال
        name: body
        widget: markdown
