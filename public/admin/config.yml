backend:
  name: github
  repo: yasiraboanmar/yasiraboanmar-site
  branch: main
  base_url: https://yasiraboanmar.com
  auth_endpoint: /api/auth

media_folder: public/images/blog
public_folder: /images/blog

locale: ar

collections:
  - name: pages
    label: "الصفحات"
    media_folder: "/public/images/profile"
    public_folder: "/images/profile"
    files:
      - name: home_ar
        label: "الصفحة الرئيسية (عربي)"
        file: src/data/home-ar.json
        fields:
          - label: "Meta"
            name: meta
            widget: object
            fields:
              - { label: "عنوان الصفحة", name: title, widget: string }
              - { label: "وصف الصفحة", name: description, widget: text }
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - { label: "الصورة الشخصية", name: photo, widget: image }
              - { label: "بادج الحالة", name: badge, widget: string }
              - { label: "الاسم (عربي)", name: name_ar, widget: string }
              - { label: "الاسم (إنجليزي)", name: name_en, widget: string }
              - { label: "المسمى الوظيفي", name: subtitle, widget: string }
              - { label: "الوصف المختصر", name: lead, widget: text }
              - { label: "مسار ملف السيرة الذاتية", name: cv_file, widget: string, hint: "مثال: /yasir a C.V.pdf" }
              - { label: "البريد الإلكتروني", name: email, widget: string }
          - label: "الإحصائيات"
            name: stats
            widget: list
            fields:
              - { label: "الرقم", name: number, widget: string }
              - { label: "التسمية", name: label, widget: string }
          - label: "نبذة عني (النقاط)"
            name: about
            widget: list
            field: { label: "نقطة", name: item, widget: string }
          - label: "المهارات والخبرات"
            name: skills
            widget: list
            fields:
              - { label: "عنوان المجموعة", name: title, widget: string }
              - label: "المهارات"
                name: chips
                widget: list
                field: { label: "مهارة", name: chip, widget: string }
          - label: "التواصل"
            name: contact
            widget: object
            fields:
              - { label: "عنوان القسم", name: title, widget: string }
              - { label: "الوصف", name: description, widget: text }
              - { label: "البريد الإلكتروني", name: email, widget: string }
              - { label: "رابط LinkedIn", name: linkedin, widget: string }
              - { label: "مسار ملف VCF", name: vcf_file, widget: string, hint: "مثال: /yasir.vcf" }

      - name: home_en
        label: "Home Page (English)"
        file: src/data/home-en.json
        fields:
          - label: "Meta"
            name: meta
            widget: object
            fields:
              - { label: "Page Title", name: title, widget: string }
              - { label: "Page Description", name: description, widget: text }
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - { label: "Profile Photo", name: photo, widget: image }
              - { label: "Status Badge", name: badge, widget: string }
              - { label: "Name (Arabic)", name: name_ar, widget: string }
              - { label: "Name (English)", name: name_en, widget: string }
              - { label: "Job Title", name: subtitle, widget: string }
              - { label: "Lead Description", name: lead, widget: text }
              - { label: "CV File Path", name: cv_file, widget: string, hint: "Example: /yasir a C.V.pdf" }
              - { label: "Email Address", name: email, widget: string }
          - label: "Stats"
            name: stats
            widget: list
            fields:
              - { label: "Number", name: number, widget: string }
              - { label: "Label", name: label, widget: string }
          - label: "About Me (bullet points)"
            name: about
            widget: list
            field: { label: "Item", name: item, widget: string }
          - label: "Skills & Experience"
            name: skills
            widget: list
            fields:
              - { label: "Group Title", name: title, widget: string }
              - label: "Skills"
                name: chips
                widget: list
                field: { label: "Skill", name: chip, widget: string }
          - label: "Contact"
            name: contact
            widget: object
            fields:
              - { label: "Section Title", name: title, widget: string }
              - { label: "Description", name: description, widget: text }
              - { label: "Email Address", name: email, widget: string }
              - { label: "LinkedIn URL", name: linkedin, widget: string }
              - { label: "VCF File Path", name: vcf_file, widget: string, hint: "Example: /yasir.vcf" }

  - name: blog_ar
    label: "المقالات (عربي)"
    label_singular: "مقال عربي"
    folder: src/content/blog/ar
    create: true
    slug: "{{fields.url_slug}}"
    fields:
      - label: "الرابط (slug)"
        name: url_slug
        widget: string
        required: true
        hint: "أحرف إنجليزية صغيرة وأرقام وشرطات فقط — يجب أن يكون نفسه في المقال الإنجليزي. مثال: hr-history-digital-era"
        pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', "أحرف إنجليزية صغيرة وأرقام وشرطات فقط"]
      - label: "العنوان (عربي)"
        name: title
        widget: string
        required: true
      - label: "الوصف (عربي)"
        name: description
        widget: text
        required: true
      - label: "تاريخ النشر"
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: "الوسوم"
        name: tags
        widget: list
        required: false
        default: []
      - label: "مسودة (لا ينشر)"
        name: draft
        widget: boolean
        default: false
      - label: "تم النشر على LinkedIn"
        name: linkedinPosted
        widget: boolean
        default: false
      - label: "صورة الغلاف (اختياري)"
        name: cover
        widget: image
        required: false
      - label: "محتوى المقال (عربي)"
        name: body
        widget: markdown

  - name: blog_en
    label: "Articles (English)"
    label_singular: "English Article"
    folder: src/content/blog/en
    create: true
    slug: "{{fields.url_slug}}"
    fields:
      - label: "URL Slug"
        name: url_slug
        widget: string
        required: true
        hint: "Lowercase letters, numbers, and hyphens only — must match the Arabic post slug exactly."
        pattern: ['^[a-z0-9][a-z0-9-]*[a-z0-9]$', "Lowercase letters, numbers, and hyphens only"]
      - label: "Title (English)"
        name: title
        widget: string
        required: true
      - label: "Description (English)"
        name: description
        widget: text
        required: true
      - label: "Publish Date"
        name: pubDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: true
      - label: "Tags"
        name: tags
        widget: list
        required: false
        default: []
      - label: "Draft (don't publish)"
        name: draft
        widget: boolean
        default: false
      - label: "Posted on LinkedIn"
        name: linkedinPosted
        widget: boolean
        default: false
      - label: "Cover image (optional)"
        name: cover
        widget: image
        required: false
      - label: "Article content (English)"
        name: body
        widget: markdown
