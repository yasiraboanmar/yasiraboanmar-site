name: Post to LinkedIn

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**.md'
      - 'src/content/blog/**.mdx'

jobs:
  post-linkedin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect new blog posts
        id: detect
        run: |
          # Find files added in this commit (not modified)
          NEW_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'src/content/blog/*.md' 'src/content/blog/*.mdx' 2>/dev/null || echo "")
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          if [ -n "$NEW_FILES" ]; then
            echo "has_new=true" >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.has_new == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Post to LinkedIn
        if: steps.detect.outputs.has_new == 'true'
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          SITE_URL: https://yasiraboanmar.com
        run: |
          # Parse frontmatter from new blog post files
          for FILE in ${{ steps.detect.outputs.new_files }}; do
            echo "Processing: $FILE"

            # Extract title and description from frontmatter
            TITLE=$(grep -m1 '^title:' "$FILE" | sed 's/^title: *"//' | sed 's/"$//' | sed "s/^title: *'//" | sed "s/'$//")
            DESC=$(grep -m1 '^description:' "$FILE" | sed 's/^description: *"//' | sed 's/"$//' | sed "s/^description: *'//" | sed "s/'$//")
            DRAFT=$(grep -m1 '^draft:' "$FILE" | awk '{print $2}')

            # Skip drafts
            if [ "$DRAFT" = "true" ]; then
              echo "Skipping draft: $FILE"
              continue
            fi

            # Build post URL from filename
            SLUG=$(basename "$FILE" .md)
            SLUG=$(basename "$SLUG" .mdx)
            POST_URL="${SITE_URL}/blog/${SLUG}/"

            # Compose LinkedIn post text
            POST_TEXT="${TITLE}

${DESC}

اقرأ المقال كاملاً:
${POST_URL}

#الموارد_البشرية #HR #GOSI #السعودية"

            echo "Posting to LinkedIn: $TITLE"

            # Post via LinkedIn API
            curl -s -X POST "https://api.linkedin.com/v2/ugcPosts" \
              -H "Authorization: Bearer ${LINKEDIN_ACCESS_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "X-Restli-Protocol-Version: 2.0.0" \
              -d "{
                \"author\": \"urn:li:member:${LINKEDIN_PERSON_URN}\",
                \"lifecycleState\": \"PUBLISHED\",
                \"specificContent\": {
                  \"com.linkedin.ugc.ShareContent\": {
                    \"shareCommentary\": {
                      \"text\": $(echo "$POST_TEXT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
                    },
                    \"shareMediaCategory\": \"ARTICLE\",
                    \"media\": [{
                      \"status\": \"READY\",
                      \"originalUrl\": \"${POST_URL}\",
                      \"title\": {
                        \"attributes\": [],
                        \"text\": $(echo "$TITLE" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read().strip()))')
                      },
                      \"description\": {
                        \"attributes\": [],
                        \"text\": $(echo "$DESC" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read().strip()))')
                      }
                    }]
                  }
                },
                \"visibility\": {
                  \"com.linkedin.ugc.MemberNetworkVisibility\": \"PUBLIC\"
                }
              }" \
              --fail-with-body && echo "Successfully posted to LinkedIn!" || echo "LinkedIn post failed"
          done
