<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>لوحة التحكم - مدونة ياسر الجيادي</title>

  <!-- Arabic font (matches the public site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
  />

  <style>
    /* =====================================================================
       Stats bar (fixed footer) — light mode
       ===================================================================== */
    #stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 99999;
      height: auto;
      min-height: 48px;
      background: #f4f6f5;
      border-top: 1px solid #d9e0db;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: "Cairo", system-ui, sans-serif;
      font-size: 13px;
      color: #5a6b5e;
    }
    #stats-bar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #1b9e4b;
      text-decoration: none;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(27,158,75,.30);
      background: rgba(27,158,75,.08);
      transition: background .15s;
    }
    #stats-bar a:hover { background: rgba(27,158,75,.15); }
    #stats-numbers { display: flex; gap: 20px; flex: 1; }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-val { color: #1a1f1b; font-weight: 700; font-size: 14px; }

    /* =====================================================================
       Decap CMS — default light LTR theme kept fully intact.
       Only two tweaks: Cairo font + full-width layout fix.
       ===================================================================== */

    /* Full-bleed app — no stray empty area on the side */
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body {
      padding-bottom: 48px;   /* clear the fixed stats bar */
    }
    #nc-root { width: 100% !important; min-height: 100vh; }
    #nc-root > div,
    #nc-root [class*="AppMain"],
    #nc-root [class*="App-"] {
      width: 100% !important;
      max-width: none !important;
    }

    /* Cairo font everywhere */
    #nc-root,
    #nc-root input, #nc-root textarea, #nc-root select, #nc-root button {
      font-family: "Cairo", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif !important;
    }

    /* =====================================================================
       Responsive — tablet & mobile
       ===================================================================== */

    /* Tablet (≤ 768px) */
    @media (max-width: 768px) {
      #stats-bar {
        padding: 8px 14px;
        gap: 10px;
        font-size: 12px;
      }
      #stats-numbers { gap: 14px; }
      .stat-val { font-size: 13px; }
      #stats-bar a { padding: 4px 10px; }

      /* Decap sidebar: prevent overflow on narrow viewports */
      #nc-root [class*="Sidebar"],
      #nc-root [class*="sidebar"] {
        min-width: 0 !important;
      }
    }

    /* Mobile (≤ 480px): two-row bar */
    @media (max-width: 480px) {
      #stats-bar {
        height: auto;
        min-height: 48px;
        padding: 6px 12px;
        flex-wrap: wrap;
        gap: 4px 12px;
      }
      body { padding-bottom: 68px; }
      #stats-numbers {
        flex: 0 0 100%;
        gap: 16px;
        font-size: 12px;
      }
      .stat-val { font-size: 13px; }
      #stats-bar a {
        flex: 1;
        justify-content: center;
        padding: 3px 8px;
        font-size: 12px;
      }
    }

    /* Very small (≤ 360px): icon-only link */
    @media (max-width: 360px) {
      .cf-label { display: none; }
      #stats-numbers { gap: 10px; }
    }
  </style>
</head>
<body>
  <!-- Decap CMS pinned to an exact version -->
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>

  <div id="stats-bar">
    <div id="stats-numbers">
      <div class="stat-item">
        <span>الزيارات اليوم:</span>
        <span class="stat-val" id="visits-today">...</span>
      </div>
      <div class="stat-item">
        <span>المشاهدات اليوم:</span>
        <span class="stat-val" id="views-today">...</span>
      </div>
    </div>
    <a href="https://dash.cloudflare.com/0787d5cd4d1f323350688f98c13c54af/web-analytics/overview?siteTag~in=e5d622910da64010a6e584ac2179f7bf&excludeBots=Yes" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 3h7v2H5v14h14v-5h2v7H3V3zm11 0h7v7h-2V6.41l-9.29 9.3-1.42-1.42L18.59 5H14V3z"/>
      </svg>
      <span class="cf-label">Cloudflare Analytics</span>
    </a>
  </div>

  <!-- Preview pane: Cairo font only (default light LTR layout kept) -->
  <script>
    if (window.CMS && typeof window.CMS.registerPreviewStyle === 'function') {
      window.CMS.registerPreviewStyle(
        'data:text/css;charset=utf-8,' + encodeURIComponent(
          '@import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap");' +
          'html,body{font-family:"Cairo",system-ui,sans-serif;line-height:1.9;}'
        ),
        { raw: true }
      );
    }
  </script>

  <script>
    (function() {
      // Load cached numbers instantly
      try {
        var raw = localStorage.getItem('cf_stats');
        if (raw) {
          var c = JSON.parse(raw);
          if (Date.now() - c.ts < 5 * 60 * 1000) {
            document.getElementById('visits-today').textContent = c.visits;
            document.getElementById('views-today').textContent = c.views;
          }
        }
      } catch(e) {}

      // Fetch fresh numbers from server
      fetch('/api/stats')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var v = (d.visits !== undefined && d.visits !== null) ? d.visits.toLocaleString() : '—';
          var p = (d.pageViews !== undefined && d.pageViews !== null) ? d.pageViews.toLocaleString() : '—';
          document.getElementById('visits-today').textContent = v;
          document.getElementById('views-today').textContent = p;
          if (d.visits > 0 || d.pageViews > 0) {
            try {
              localStorage.setItem('cf_stats', JSON.stringify({ visits: v, views: p, ts: Date.now() }));
            } catch(e) {}
          }
        })
        .catch(function() {
          document.getElementById('visits-today').textContent = '—';
          document.getElementById('views-today').textContent = '—';
        });
    })();
  </script>
</body>
</html>
