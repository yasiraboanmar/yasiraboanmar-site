<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>لوحة التحكم - مدونة ياسر الجيادي</title>

  <!-- Arabic font (matches the public site) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap"
  />

  <style>
    /* =====================================================================
       Theme tokens — soft dark palette, aligned with the stats bar
       ===================================================================== */
    :root {
      --cms-bg:       #141a16;   /* soft dark app background */
      --cms-surface:  #1b211d;   /* panels / top bar */
      --cms-card:     #1f2620;   /* inputs / cards */
      --cms-border:   #2c352d;
      --cms-text:     #e6ebe7;
      --cms-muted:    #8a9a8e;
      --cms-accent:   #29cc68;
      --cms-accent-ink: #082213;
      --cms-accent-dim: rgba(41,204,104,.10);
      --cms-accent-border: rgba(41,204,104,.30);
      --cms-font: "Cairo", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      --stats-bar-h: 48px;
    }

    /* =====================================================================
       Stats bar (fixed footer) — unchanged
       ===================================================================== */
    #stats-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 99999;
      background: #1a1f1b;
      border-top: 1px solid #2a3826;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #7a9080;
    }
    #stats-bar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #29cc68;
      text-decoration: none;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid rgba(41,204,104,.25);
      background: rgba(41,204,104,.07);
      transition: background .15s;
    }
    #stats-bar a:hover { background: rgba(41,204,104,.15); }
    #stats-numbers { display: flex; gap: 20px; flex: 1; }
    .stat-item { display: flex; align-items: center; gap: 6px; }
    .stat-val { color: #e8ede9; font-weight: 700; font-size: 14px; }

    /* =====================================================================
       Decap CMS — simple dark + RTL theme
       Principle: don't fight Decap's layout engine. Let the app fill the
       full width (fixes the black gap), set RTL flow so collections sit on
       the right, theme only the surfaces that matter (bg, text, inputs).
       ===================================================================== */

    /* (1) Full-bleed app — no stray black area on the side */
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100vh;
      background: var(--cms-bg);
      overflow-x: hidden;
    }
    body {
      font-family: var(--cms-font);
      padding-bottom: var(--stats-bar-h);   /* clear the fixed stats bar */
    }
    #nc-root {
      width: 100% !important;
      min-height: 100vh;
      background: var(--cms-bg) !important;
      color: var(--cms-text);
    }
    /* Force every top-level wrapper to span the full width so RTL flex
       reversal can't expose an empty strip on the left */
    #nc-root > div,
    #nc-root [class*="AppMain"],
    #nc-root [class*="App-"] {
      width: 100% !important;
      max-width: none !important;
      background: var(--cms-bg) !important;
    }

    /* (2) RTL flow → collections list & nav align to the right */
    #nc-root { direction: rtl; text-align: right; }

    /* Base typography everywhere */
    #nc-root,
    #nc-root input, #nc-root textarea, #nc-root select, #nc-root button {
      font-family: var(--cms-font) !important;
    }

    /* (3) Clean dark surfaces — kept minimal */
    #nc-root [class*="Card"],
    #nc-root [class*="Sidebar"],
    #nc-root header,
    #nc-root [class*="AppHeader"] {
      background: var(--cms-surface) !important;
      border-color: var(--cms-border) !important;
      color: var(--cms-text) !important;
    }

    #nc-root h1, #nc-root h2, #nc-root h3, #nc-root h4 {
      color: var(--cms-text) !important;
    }
    #nc-root label, #nc-root [class*="Label"] {
      color: var(--cms-muted) !important;
    }

    /* Inputs + markdown editor */
    #nc-root input,
    #nc-root textarea,
    #nc-root select,
    #nc-root [contenteditable="true"] {
      background: var(--cms-card) !important;
      color: var(--cms-text) !important;
      border: 1px solid var(--cms-border) !important;
      border-radius: 8px !important;
      direction: auto;            /* Arabic → RTL, English → LTR per content */
      text-align: start;
      line-height: 1.9;
    }
    #nc-root input:focus,
    #nc-root textarea:focus,
    #nc-root [contenteditable="true"]:focus {
      border-color: var(--cms-accent-border) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px var(--cms-accent-dim) !important;
    }
    #nc-root input::placeholder,
    #nc-root textarea::placeholder { color: var(--cms-muted) !important; }

    /* Primary action buttons */
    #nc-root button[class*="Primary"],
    #nc-root [class*="button"][class*="primary"] {
      background: var(--cms-accent) !important;
      color: var(--cms-accent-ink) !important;
      border-radius: 8px !important;
    }

    /* Dark scrollbars */
    #nc-root *::-webkit-scrollbar { width: 8px; height: 8px; }
    #nc-root *::-webkit-scrollbar-track { background: var(--cms-bg); }
    #nc-root *::-webkit-scrollbar-thumb { background: var(--cms-border); border-radius: 4px; }
    #nc-root *::-webkit-scrollbar-thumb:hover { background: var(--cms-accent); }
  </style>
</head>
<body>
  <!-- Decap CMS pinned to an exact version -->
  <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>

  <div id="stats-bar">
    <div id="stats-numbers">
      <div class="stat-item">
        <span>الزيارات اليوم:</span>
        <span class="stat-val" id="visits-today">...</span>
      </div>
      <div class="stat-item">
        <span>المشاهدات اليوم:</span>
        <span class="stat-val" id="views-today">...</span>
      </div>
    </div>
    <a href="https://dash.cloudflare.com/0787d5cd4d1f323350688f98c13c54af/web-analytics/overview?siteTag~in=e5d622910da64010a6e584ac2179f7bf&excludeBots=Yes" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        <path d="M3 3h7v2H5v14h14v-5h2v7H3V3zm11 0h7v7h-2V6.41l-9.29 9.3-1.42-1.42L18.59 5H14V3z"/>
      </svg>
      Cloudflare Analytics
    </a>
  </div>

  <!-- Match the live preview pane to the dark/RTL theme -->
  <script>
    if (window.CMS && typeof window.CMS.registerPreviewStyle === 'function') {
      window.CMS.registerPreviewStyle(
        'data:text/css;charset=utf-8,' + encodeURIComponent(
          '@import url("https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap");' +
          'html,body{background:#141a16;color:#e6ebe7;font-family:"Cairo",system-ui,sans-serif;' +
          'direction:rtl;line-height:1.9;padding:16px;}' +
          'h1,h2,h3,h4{color:#e6ebe7;font-weight:800;}' +
          'a{color:#29cc68;}' +
          'blockquote{border-inline-start:3px solid #29cc68;background:rgba(41,204,104,.10);' +
          'margin:1.5em 0;padding:12px 18px;border-radius:0 10px 10px 0;color:#8a9a8e;}' +
          'code{background:#1f2620;border:1px solid #2c352d;border-radius:5px;padding:2px 7px;}' +
          'table{width:100%;border-collapse:collapse;}th,td{border:1px solid #2c352d;padding:8px 14px;text-align:start;}'
        ),
        { raw: true }
      );
    }
  </script>

  <script>
    (function() {
      // Load cached numbers instantly
      try {
        var raw = localStorage.getItem('cf_stats');
        if (raw) {
          var c = JSON.parse(raw);
          if (Date.now() - c.ts < 5 * 60 * 1000) {
            document.getElementById('visits-today').textContent = c.visits;
            document.getElementById('views-today').textContent = c.views;
          }
        }
      } catch(e) {}

      // Fetch fresh numbers from server
      fetch('/api/stats')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var v = (d.visits !== undefined && d.visits !== null) ? d.visits.toLocaleString() : '—';
          var p = (d.pageViews !== undefined && d.pageViews !== null) ? d.pageViews.toLocaleString() : '—';
          document.getElementById('visits-today').textContent = v;
          document.getElementById('views-today').textContent = p;
          if (d.visits > 0 || d.pageViews > 0) {
            try {
              localStorage.setItem('cf_stats', JSON.stringify({ visits: v, views: p, ts: Date.now() }));
            } catch(e) {}
          }
        })
        .catch(function() {
          document.getElementById('visits-today').textContent = '—';
          document.getElementById('views-today').textContent = '—';
        });
    })();
  </script>
</body>
</html>
